<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mochi — Kawaii AI Companion ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink:#f48fb1; --pink-l:#fce4ec; --pink-d:#c2185b;
  --purple:#ce93d8; --purple-l:#f3e5f5; --purple-d:#7b1fa2;
  --ground:#a5d6a7; --ground-d:#66bb6a;
}

html, body { width:100%; height:100%; font-family:'Nunito',sans-serif; background:#fce4ec; overflow:hidden; }

#bg { position:fixed; inset:0; background:linear-gradient(160deg,#e8f4fd 0%,#f3e5f5 40%,#fce4ec 75%,#fff9c4 100%); z-index:0; }
.bg-orb { position:absolute; border-radius:50%; opacity:.17; animation:orbPulse ease-in-out infinite alternate; }
@keyframes orbPulse { from{transform:scale(1)} to{transform:scale(1.09)} }

#scene { position:fixed; inset:0; overflow:hidden; z-index:1; }

#ground { position:absolute; bottom:130px; left:0; right:0; height:56px; background:linear-gradient(180deg,var(--ground) 0%,var(--ground-d) 100%); z-index:2; }
#ground::before { content:''; position:absolute; top:-14px; left:0; right:0; height:28px; background:var(--ground); border-radius:50% 50% 0 0/14px 14px 0 0; }

.cloud { position:absolute; z-index:3; animation:cloudMove linear infinite; }
@keyframes cloudMove { from{transform:translateX(110vw)} to{transform:translateX(-280px)} }

#avatar { position:absolute; bottom:186px; width:92px; height:120px; z-index:10; cursor:pointer; user-select:none; filter:drop-shadow(0 6px 14px rgba(200,100,180,.32)); transition:filter .2s; }
#avatar:hover { filter:drop-shadow(0 8px 20px rgba(200,100,180,.52)); }
#avatar svg { width:100%; height:100%; overflow:visible; }

/* ── SPEECH BUBBLE ── */
#speechWrap {
  position:absolute; z-index:20; bottom:282px;
  width:290px;
  opacity:0; transition:opacity .35s ease; pointer-events:none;
}
#speechWrap.visible { opacity:1; pointer-events:auto; }

#speechBox {
  background:white; border:2.5px solid var(--purple); border-radius:22px;
  padding:12px 16px 12px 14px;
  font-family:'Quicksand',sans-serif; font-size:14px; font-weight:600;
  color:var(--purple-d); line-height:1.65; word-wrap:break-word;
  max-height:230px; overflow-y:auto;
  box-shadow:0 6px 28px rgba(180,80,200,.2);
  scrollbar-width:thin; scrollbar-color:var(--purple) transparent;
}
#speechBox::-webkit-scrollbar { width:4px; }
#speechBox::-webkit-scrollbar-thumb { background:var(--purple); border-radius:4px; }

/* tail pointing down-left */
#speechWrap .tail-outer {
  position:absolute; bottom:-14px; left:26px;
  border:7px solid transparent; border-top-color:var(--purple);
}
#speechWrap .tail-inner {
  position:absolute; bottom:-9px; left:28px; z-index:1;
  border:5px solid transparent; border-top-color:white;
}
/* tail pointing down-right */
#speechWrap.flipped .tail-outer { left:auto; right:26px; }
#speechWrap.flipped .tail-inner { left:auto; right:28px; }

#closeBtn {
  position:absolute; top:-11px; right:-11px; width:22px; height:22px;
  border-radius:50%; background:var(--purple-d); border:2.5px solid white;
  color:white; font-size:11px; font-weight:800; cursor:pointer;
  display:flex; align-items:center; justify-content:center; line-height:1;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}

/* thinking dots */
.dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--purple); margin:0 3px; animation:dotBounce .9s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.30s}
@keyframes dotBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

/* ── PARTICLES ── */
.particle { position:absolute; pointer-events:none; z-index:30; font-size:20px; animation:particlePop 1s ease-out forwards; }
@keyframes particlePop { 0%{transform:scale(0) translateY(0) rotate(0deg);opacity:1} 60%{transform:scale(1.5) translateY(-28px) rotate(20deg);opacity:1} 100%{transform:scale(.6) translateY(-55px) rotate(40deg);opacity:0} }

/* ── BADGES ── */
#titleBadge { position:fixed; top:14px; left:16px; z-index:50; background:rgba(255,255,255,.9); border:2px solid var(--pink); border-radius:30px; padding:5px 16px; font-size:14px; font-weight:800; color:var(--pink-d); backdrop-filter:blur(8px); box-shadow:0 2px 14px rgba(244,143,177,.22); }
#moodBadge  { position:fixed; top:14px; right:16px; z-index:50; background:rgba(255,255,255,.9); border:2px solid var(--purple); border-radius:30px; padding:5px 14px 5px 10px; display:flex; align-items:center; gap:6px; font-family:'Quicksand',sans-serif; font-size:13px; font-weight:700; color:var(--purple-d); backdrop-filter:blur(8px); box-shadow:0 2px 14px rgba(180,80,200,.18); }
#moodDot    { width:10px; height:10px; border-radius:50%; background:var(--pink); transition:background .4s; }

/* ── API STATUS BADGE (CENTER) ── */
#apiStatus {
  position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:50;
  background:rgba(255,255,255,.9); border:2px solid #ef5350; border-radius:30px;
  padding:5px 14px; font-family:'Quicksand',sans-serif; font-size:12px; font-weight:700;
  color:#c62828; backdrop-filter:blur(8px); box-shadow:0 2px 14px rgba(239,83,80,.2);
  display:flex; align-items:center; gap:6px;
  opacity:0; transition:opacity .3s, border-color .3s, color .3s; pointer-events:none;
}
#apiStatus.visible { opacity:1; }
#apiStatus.online { border-color:var(--ground-d); color:#2e7d32; box-shadow:0 2px 14px rgba(102,187,106,.2); }
#apiStatus .status-dot { width:8px; height:8px; border-radius:50%; background:#ef5350; transition:background .3s; }
#apiStatus.online .status-dot { background:var(--ground-d); }

/* ── API KEY MODAL ── */
#apiModal { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background:rgba(243,229,245,.9); backdrop-filter:blur(10px); }
#apiModal.hidden { display:none; }
#apiCard { background:white; border-radius:28px; padding:36px 32px; max-width:380px; width:90%; box-shadow:0 12px 60px rgba(180,80,200,.24); border:2.5px solid var(--purple); text-align:center; }
#apiCard h2 { font-size:22px; font-weight:800; color:var(--purple-d); margin-bottom:6px; }
#apiCard p  { font-size:13px; color:#888; margin-bottom:20px; line-height:1.7; }
#apiCard a  { color:var(--purple-d); font-weight:700; }
#apiKeyInput { width:100%; border:2px solid var(--purple); border-radius:14px; padding:10px 14px; font-size:14px; font-family:'Quicksand',sans-serif; font-weight:600; color:var(--purple-d); outline:none; margin-bottom:14px; transition:border-color .2s,box-shadow .2s; }
#apiKeyInput:focus { border-color:var(--purple-d); box-shadow:0 0 0 3px rgba(206,147,216,.28); }
#apiKeyInput::placeholder { color:#ce93d8; font-weight:500; }
.btn-primary { width:100%; padding:11px; border:none; border-radius:14px; cursor:pointer; background:linear-gradient(135deg,var(--purple),var(--pink-d)); color:white; font-size:15px; font-weight:800; font-family:'Nunito',sans-serif; box-shadow:0 4px 16px rgba(194,24,91,.3); transition:transform .15s,box-shadow .15s; margin-bottom:10px; }
.btn-primary:hover { transform:scale(1.03); box-shadow:0 6px 22px rgba(194,24,91,.4); }
.btn-primary:active { transform:scale(.97); }
.btn-secondary { width:100%; padding:11px; border:2px solid var(--purple); border-radius:14px; cursor:pointer; background:white; color:var(--purple-d); font-size:14px; font-weight:800; font-family:'Nunito',sans-serif; transition:transform .15s, background .15s; }
.btn-secondary:hover { background:var(--purple-l); transform:scale(1.02); }
.btn-secondary:active { transform:scale(.98); }
#apiErr { font-size:12px; color:#c2185b; margin-top:8px; min-height:16px; }

/* ── CHAT PANEL ── */
#chatPanel { position:fixed; bottom:0; left:0; right:0; height:130px; background:rgba(255,255,255,.93); border-top:2px solid rgba(206,147,216,.35); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); z-index:100; display:flex; flex-direction:column; }
#chatHistory { flex:1; overflow-y:auto; padding:7px 14px 0; display:flex; flex-direction:column; gap:4px; scrollbar-width:thin; scrollbar-color:var(--purple) transparent; }
#chatHistory::-webkit-scrollbar { width:4px; }
#chatHistory::-webkit-scrollbar-thumb { background:var(--purple); border-radius:4px; }
.msg { max-width:80%; padding:6px 13px; border-radius:14px; font-family:'Quicksand',sans-serif; font-size:13px; font-weight:600; line-height:1.5; word-wrap:break-word; animation:msgIn .22s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.msg.user { align-self:flex-end; background:var(--purple-d); color:white; border-bottom-right-radius:4px; }
.msg.bot  { align-self:flex-start; background:var(--pink-l); color:var(--purple-d); border-bottom-left-radius:4px; border:1.5px solid rgba(206,147,216,.3); }
#chatInputRow { display:flex; align-items:flex-end; gap:8px; padding:7px 12px 10px; }
#chatInput { flex:1; border:2px solid var(--purple); border-radius:22px; padding:9px 16px; font-family:'Quicksand',sans-serif; font-size:14px; font-weight:600; color:var(--purple-d); background:white; outline:none; resize:none; min-height:40px; max-height:80px; transition:border-color .2s,box-shadow .2s; line-height:1.4; }
#chatInput:focus { border-color:var(--purple-d); box-shadow:0 0 0 3px rgba(206,147,216,.25); }
#chatInput::placeholder { color:#ce93d8; font-weight:500; }
#chatInput:disabled, #sendBtn:disabled { opacity:.45; cursor:not-allowed; }
#sendBtn { width:40px; height:40px; flex-shrink:0; background:linear-gradient(135deg,var(--purple),var(--pink-d)); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(194,24,91,.3); transition:transform .15s,box-shadow .15s; }
#sendBtn:not(:disabled):hover { transform:scale(1.08); box-shadow:0 6px 18px rgba(194,24,91,.4); }
#sendBtn:not(:disabled):active { transform:scale(.94); }

#hint { position:fixed; bottom:145px; left:50%; transform:translateX(-50%); z-index:50; font-family:'Quicksand',sans-serif; font-size:12px; font-weight:600; color:var(--purple-d); background:rgba(255,255,255,.78); border-radius:20px; padding:4px 13px; pointer-events:none; opacity:.75; animation:hintFade 4.5s ease-out 2s forwards; }
@keyframes hintFade { 0%{opacity:.75} 80%{opacity:.75} 100%{opacity:0} }
</style>
</head>
<body>

<!-- API KEY MODAL -->
<div id="apiModal">
  <div id="apiCard">
    <div style="font-size:42px;margin-bottom:10px">🌸</div>
    <h2>Hi! I'm Mochi ✨</h2>
    <p>To chat with me, enter your<br>
       <strong>Google Gemini API key</strong>.<br>
       <a href="https://aistudio.google.com/app/apikey" target="_blank">Get your free key here →</a><br><br>
       Your key stays in your browser only.</p>
    <input id="apiKeyInput" type="password" placeholder="AIzaSy... paste your key here" autocomplete="off"/>
    <button class="btn-primary" id="apiKeyBtn">Wake up Mochi! 🌟</button>
    <button class="btn-secondary" id="offlineBtn">Try Offline Mode ☁️</button>
    <div id="apiErr"></div>
  </div>
</div>

<!-- BG ORBS -->
<div id="bg">
  <div class="bg-orb" style="width:420px;height:420px;background:#f48fb1;top:-110px;left:-90px;animation-duration:7s;"></div>
  <div class="bg-orb" style="width:300px;height:300px;background:#ce93d8;top:30%;right:-70px;animation-duration:9s;animation-delay:2s;"></div>
  <div class="bg-orb" style="width:240px;height:240px;background:#80cbc4;bottom:160px;left:18%;animation-duration:11s;animation-delay:1s;"></div>
  <div class="bg-orb" style="width:170px;height:170px;background:#ffe082;bottom:200px;right:14%;animation-duration:8s;animation-delay:3s;"></div>
</div>

<!-- SCENE -->
<div id="scene">
  <!-- Trees -->
  <div style="position:absolute;bottom:185px;left:4%;z-index:2;opacity:.75;">
    <svg width="52" height="82" viewBox="0 0 52 82"><rect x="21" y="56" width="10" height="26" rx="3" fill="#6d4c41"/><ellipse cx="26" cy="46" rx="23" ry="27" fill="#66bb6a"/><ellipse cx="26" cy="33" rx="17" ry="19" fill="#81c784"/><ellipse cx="26" cy="22" rx="11" ry="13" fill="#a5d6a7"/></svg>
  </div>
  <div style="position:absolute;bottom:185px;right:7%;z-index:2;opacity:.75;">
    <svg width="46" height="72" viewBox="0 0 46 72"><rect x="19" y="49" width="8" height="23" rx="3" fill="#6d4c41"/><ellipse cx="23" cy="40" rx="20" ry="23" fill="#66bb6a"/><ellipse cx="23" cy="28" rx="15" ry="17" fill="#81c784"/><ellipse cx="23" cy="18" rx="10" ry="12" fill="#a5d6a7"/></svg>
  </div>
  <div style="position:absolute;bottom:185px;left:17%;z-index:2;opacity:.7;">
    <svg width="32" height="54" viewBox="0 0 32 54"><rect x="12" y="37" width="8" height="17" rx="2" fill="#6d4c41"/><ellipse cx="16" cy="31" rx="15" ry="19" fill="#4caf50"/><ellipse cx="16" cy="20" rx="11" ry="13" fill="#66bb6a"/></svg>
  </div>
  <div style="position:absolute;bottom:185px;right:21%;z-index:2;opacity:.7;">
    <svg width="36" height="62" viewBox="0 0 36 62"><rect x="14" y="43" width="8" height="19" rx="2" fill="#6d4c41"/><ellipse cx="18" cy="35" rx="17" ry="21" fill="#388e3c"/><ellipse cx="18" cy="22" rx="13" ry="15" fill="#4caf50"/><ellipse cx="18" cy="13" rx="9" ry="11" fill="#66bb6a"/></svg>
  </div>

  <!-- Flowers -->
  <div style="position:absolute;bottom:185px;left:10%;z-index:3;opacity:.85;">
    <svg width="30" height="24" viewBox="0 0 30 24"><ellipse cx="15" cy="9" rx="5" ry="5" fill="#f48fb1"/><ellipse cx="9" cy="9" rx="4" ry="4" fill="#f48fb1" opacity=".7"/><ellipse cx="21" cy="9" rx="4" ry="4" fill="#f48fb1" opacity=".7"/><ellipse cx="15" cy="4" rx="4" ry="4" fill="#f48fb1" opacity=".7"/><circle cx="15" cy="9" r="3" fill="#ffe082"/><line x1="15" y1="13" x2="15" y2="24" stroke="#66bb6a" stroke-width="2"/></svg>
  </div>
  <div style="position:absolute;bottom:185px;right:12%;z-index:3;opacity:.8;">
    <svg width="26" height="22" viewBox="0 0 26 22"><ellipse cx="13" cy="8" rx="4" ry="4" fill="#ce93d8"/><ellipse cx="8" cy="8" rx="3" ry="3" fill="#ce93d8" opacity=".7"/><ellipse cx="18" cy="8" rx="3" ry="3" fill="#ce93d8" opacity=".7"/><ellipse cx="13" cy="4" rx="3" ry="3" fill="#ce93d8" opacity=".7"/><circle cx="13" cy="8" r="2.5" fill="#fff9c4"/><line x1="13" y1="11" x2="13" y2="22" stroke="#66bb6a" stroke-width="1.5"/></svg>
  </div>

  <!-- Clouds -->
  <div class="cloud" style="top:7%;animation-duration:22s;animation-delay:0s;"><svg width="115" height="52" viewBox="0 0 115 52"><ellipse cx="58" cy="37" rx="52" ry="21" fill="rgba(255,255,255,.88)"/><ellipse cx="42" cy="29" rx="29" ry="23" fill="rgba(255,255,255,.88)"/><ellipse cx="76" cy="31" rx="23" ry="19" fill="rgba(255,255,255,.88)"/></svg></div>
  <div class="cloud" style="top:14%;animation-duration:31s;animation-delay:-11s;"><svg width="82" height="42" viewBox="0 0 82 42"><ellipse cx="41" cy="29" rx="38" ry="17" fill="rgba(255,255,255,.8)"/><ellipse cx="28" cy="23" rx="21" ry="17" fill="rgba(255,255,255,.8)"/><ellipse cx="58" cy="25" rx="19" ry="15" fill="rgba(255,255,255,.8)"/></svg></div>
  <div class="cloud" style="top:3%;animation-duration:19s;animation-delay:-7s;"><svg width="62" height="32" viewBox="0 0 62 32"><ellipse cx="31" cy="21" rx="27" ry="13" fill="rgba(255,255,255,.75)"/><ellipse cx="23" cy="17" rx="17" ry="13" fill="rgba(255,255,255,.75)"/><ellipse cx="46" cy="19" rx="15" ry="11" fill="rgba(255,255,255,.75)"/></svg></div>

  <div id="ground"></div>

  <!-- Speech bubble wrapper -->
  <div id="speechWrap">
    <div id="speechBox"></div>
    <div class="tail-outer"></div>
    <div class="tail-inner"></div>
    <button id="closeBtn" onclick="hideSpeech()">✕</button>
  </div>

  <!-- Avatar -->
  <div id="avatar">
    <svg id="avatarSvg" viewBox="0 0 92 120" xmlns="http://www.w3.org/2000/svg" overflow="visible"></svg>
  </div>
</div>

<!-- Badges & hint -->
<div id="titleBadge">✿ Mochi</div>
<div id="moodBadge"><div id="moodDot"></div><span id="moodText">Happy</span></div>

<!-- API Status -->
<div id="apiStatus"><div class="status-dot"></div><span id="apiStatusText">Offline Mode</span></div>

<div id="hint">Click Mochi! ☝</div>

<!-- Chat panel -->
<div id="chatPanel">
  <div id="chatHistory"></div>
  <div id="chatInputRow">
    <textarea id="chatInput" rows="1" placeholder="Talk to Mochi~ ♪" disabled></textarea>
    <button id="sendBtn" disabled>
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M2 8.5L15 2L9 15L8 9.5L2 8.5Z" fill="white" stroke="white" stroke-width=".6" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  MOODS
// ═══════════════════════════════════════════════════
const MOODS = {
  happy:    {B:'#f48fb1',S:'#fce4ec',A:'#c2185b',eyes:'happy',    mouth:'smile', dot:'#f48fb1',label:'Happy',   acts:['walk','idle']},
  excited:  {B:'#ffcc02',S:'#fff9e7',A:'#f57f17',eyes:'stars',    mouth:'open',  dot:'#ffcc02',label:'Excited!',acts:['jump','walk','dance']},
  sad:      {B:'#90caf9',S:'#e3f2fd',A:'#1565c0',eyes:'sad',      mouth:'frown', dot:'#90caf9',label:'Sad',     acts:['idle','walk']},
  love:     {B:'#f06292',S:'#fce4ec',A:'#880e4f',eyes:'hearts',   mouth:'smile', dot:'#f06292',label:'Loving',  acts:['idle','walk','jump']},
  thinking: {B:'#ce93d8',S:'#f3e5f5',A:'#6a1b9a',eyes:'thinking',mouth:'hmm',   dot:'#ce93d8',label:'Thinking',acts:['idle']},
  dance:    {B:'#80cbc4',S:'#e0f2f1',A:'#00695c',eyes:'happy',    mouth:'open',  dot:'#80cbc4',label:'Dancing', acts:['dance']},
  sleepy:   {B:'#b0bec5',S:'#eceff1',A:'#37474f',eyes:'sleepy',   mouth:'yawn',  dot:'#b0bec5',label:'Sleepy',  acts:['idle']},
  shy:      {B:'#ffab91',S:'#fbe9e7',A:'#bf360c',eyes:'shy',      mouth:'shy',   dot:'#ffab91',label:'Shy',     acts:['idle','walk']},
  angry:    {B:'#ef9a9a',S:'#ffebee',A:'#b71c1c',eyes:'angry',    mouth:'frown', dot:'#ef9a9a',label:'Grumpy',  acts:['walk','idle']},
  surprised:{B:'#ffe082',S:'#fffde7',A:'#e65100',eyes:'surprised',mouth:'open',  dot:'#ffe082',label:'Surprised',acts:['jump']},
};

// ═══════════════════════════════════════════════════
//  STATE & PHYSICS
// ═══════════════════════════════════════════════════
let KEY='', mood='happy', avatarX=120, dir=1;
let walkPhase=0, danceFrame=0, actionTimer=0, idleTimer=0;
let curAct='walk', jumpY=0, jumpVel=0, isJumping=false;
let squashX=1, squashY=1, breathPhase=0, blinkTimer=2000, isBlinking=false;
let isLoading=false, lastTime=0, dismissTimer=null;
let history=[], sceneW=innerWidth, sceneH=innerHeight;
let apiOnline = true; // Tracks API health

const $=id=>document.getElementById(id);
const avatarEl=$('avatar'), svgEl=$('avatarSvg'), sceneEl=$('scene');
const wrapEl=$('speechWrap'), boxEl=$('speechBox');
const moodDot=$('moodDot'), moodTxt=$('moodText');
const chatIn=$('chatInput'), sendBtn=$('sendBtn'), chatHist=$('chatHistory');
const apiStatusBadge=$('apiStatus'), apiStatusText=$('apiStatusText');

// ═══════════════════════════════════════════════════
//  API KEY & OFFLINE FLOW
// ═══════════════════════════════════════════════════
const savedKey=sessionStorage.getItem('mochi_key');
if(savedKey){KEY=savedKey;activateApp(true);}

$('apiKeyBtn').onclick=()=>{
  const k=$('apiKeyInput').value.trim();
  if(!k||k.length<20){$('apiErr').textContent="Hmm, that key doesn't look right. Try pasting again!";return;}
  KEY=k; sessionStorage.setItem('mochi_key',k);
  $('apiErr').textContent='';
  activateApp(true);
};

$('offlineBtn').onclick=()=>{
  KEY=''; 
  $('apiErr').textContent='';
  activateApp(false);
};

$('apiKeyInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('apiKeyBtn').click();});

function activateApp(isOnline){
  apiOnline = isOnline;
  $('apiModal').classList.add('hidden');
  chatIn.disabled=false; sendBtn.disabled=false; chatIn.focus();
  updateApiStatusUI();
  setTimeout(bootMochi,700);
}

function updateApiStatusUI(){
  if(apiOnline){
    apiStatusBadge.classList.add('visible', 'online');
    apiStatusText.textContent = "API: Online";
    setTimeout(() => apiStatusBadge.classList.remove('visible'), 4000);
  } else {
    apiStatusBadge.classList.add('visible');
    apiStatusBadge.classList.remove('online');
    apiStatusText.textContent = "Offline Mode";
  }
}

// ═══════════════════════════════════════════════════
//  AVATAR SVG (with blinking!)
// ═══════════════════════════════════════════════════
function eyes(type, blink){
  if(blink) {
    return `<path d="M28 34 Q34 35 40 34" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M52 34 Q58 35 64 34" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  }
  switch(type){
    case 'happy':    return`<path d="M29 32 Q35 26 40 32" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M52 32 Q58 26 63 32" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    case 'stars':    return`<text x="34" y="37" text-anchor="middle" font-size="16" fill="#f57f17">★</text><text x="57" y="37" text-anchor="middle" font-size="16" fill="#f57f17">★</text>`;
    case 'hearts':   return`<text x="34" y="37" text-anchor="middle" font-size="15" fill="#e91e63">♥</text><text x="57" y="37" text-anchor="middle" font-size="15" fill="#e91e63">♥</text>`;
    case 'sad':      return`<path d="M29 35 Q35 40 40 35" stroke="#1565c0" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M52 35 Q58 40 63 35" stroke="#1565c0" stroke-width="3" fill="none" stroke-linecap="round"/><line x1="25" y1="26" x2="41" y2="32" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/><line x1="51" y1="32" x2="67" y2="26" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>`;
    case 'thinking': return`<circle cx="34" cy="33" r="5.5" fill="#6a1b9a"/><circle cx="36.5" cy="30.5" r="2" fill="white" opacity=".75"/><circle cx="57" cy="33" r="5.5" fill="#6a1b9a"/><circle cx="59.5" cy="30.5" r="2" fill="white" opacity=".75"/><path d="M55 20 Q63 15 67 21" stroke="#9c27b0" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    case 'sleepy':   return`<path d="M27 33 Q34 33 42 33" stroke="#546e7a" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M50 33 Q57 33 64 33" stroke="#546e7a" stroke-width="4" fill="none" stroke-linecap="round"/><text x="35" y="24" text-anchor="middle" font-size="9" fill="#90a4ae">z</text><text x="44" y="17" text-anchor="middle" font-size="12" fill="#90a4ae">z</text>`;
    case 'shy':      return`<path d="M29 32 Q35 26 40 32" stroke="#bf360c" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M52 32 Q58 26 63 32" stroke="#bf360c" stroke-width="3" fill="none" stroke-linecap="round"/><line x1="27" y1="39" x2="43" y2="39" stroke="#f48fb1" stroke-width="3" stroke-linecap="round" opacity=".85"/><line x1="49" y1="39" x2="65" y2="39" stroke="#f48fb1" stroke-width="3" stroke-linecap="round" opacity=".85"/>`;
    case 'angry':    return`<circle cx="34" cy="33" r="5" fill="#b71c1c"/><circle cx="57" cy="33" r="5" fill="#b71c1c"/><line x1="26" y1="25" x2="43" y2="30" stroke="#b71c1c" stroke-width="2.5" stroke-linecap="round"/><line x1="49" y1="30" x2="66" y2="25" stroke="#b71c1c" stroke-width="2.5" stroke-linecap="round"/>`;
    case 'surprised':return`<circle cx="34" cy="33" r="6.5" fill="#6a1b9a"/><circle cx="57" cy="33" r="6.5" fill="#6a1b9a"/><circle cx="36" cy="31" r="2.5" fill="white" opacity=".75"/><circle cx="59" cy="31" r="2.5" fill="white" opacity=".75"/>`;
    default:         return`<circle cx="34" cy="33" r="5" fill="#6a1b9a"/><circle cx="57" cy="33" r="5" fill="#6a1b9a"/>`;
  }
}

function mouth(type){
  switch(type){
    case 'smile': return`<path d="M34 49 Q46 57 58 49" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    case 'open':  return`<ellipse cx="46" cy="51" rx="9" ry="7" fill="#ad1457" opacity=".85"/><path d="M37 51 Q46 58 55 51" stroke="#6a1b9a" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    case 'frown': return`<path d="M34 55 Q46 47 58 55" stroke="#1565c0" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    case 'hmm':   return`<path d="M38 52 Q46 50 54 52" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    case 'yawn':  return`<ellipse cx="46" cy="53" rx="11" ry="8" fill="#78909c" opacity=".7"/>`;
    case 'shy':   return`<path d="M38 51 Q46 56 54 51" stroke="#bf360c" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
    default:      return`<path d="M36 51 Q46 57 56 51" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  }
}

function buildSVG(){
  const m=MOODS[mood];
  const bob  = curAct==='walk'  ? Math.sin(walkPhase*.5)*2.5 : 0;
  const tilt = curAct==='walk'  ? Math.sin(walkPhase*.5)*3.5 : 0;
  const dT   = curAct==='dance' ? Math.sin(danceFrame*.18)*14 : 0;
  const aL   = curAct==='walk'  ? Math.sin(walkPhase*.5)*28 : curAct==='dance' ? Math.sin(danceFrame*.18)*52 : 0;
  const aR   = curAct==='walk'  ?-Math.sin(walkPhase*.5)*28 : curAct==='dance' ?-Math.sin(danceFrame*.18+Math.PI)*52 : 0;
  const lL   = curAct==='walk'  ? Math.sin(walkPhase*.5)*26 : curAct==='dance' ? Math.sin(danceFrame*.18)*36 : 0;
  const lR   = curAct==='walk'  ?-Math.sin(walkPhase*.5)*26 : curAct==='dance' ?-Math.sin(danceFrame*.18+Math.PI)*36 : 0;
  const jO   =-jumpY;
  
  // Breathing animation when idle
  const bY = (curAct==='idle' || curAct==='dance') ? Math.sin(breathPhase)*1.5 : 0;

  // Dynamic Shadow based on Jump height
  const shScale = Math.max(0.2, 1 - (jumpY / 120));
  const shOp    = Math.max(0.1, 0.45 - (jumpY / 150));

  const acc  = mood==='dance'?`<text x="46" y="9" text-anchor="middle" font-size="16">🎵</text>`:
               mood==='love' ?`<text x="74" y="19" text-anchor="middle" font-size="13">♥</text>`:
               mood==='thinking'?`<text x="74" y="19" text-anchor="middle" font-size="12">💭</text>`:'';

  return`
  <!-- Ground Shadow -->
  <ellipse cx="46" cy="114" rx="${28 * shScale}" ry="${7 * shScale}" fill="#000" opacity="${shOp}" />

  <!-- Main Body Group (Squash & Stretch applied from the feet) -->
  <g transform="translate(46, 114) scale(${squashX}, ${squashY}) translate(-46, -114)">
    <g transform="translate(0,${jO + bY})">
      <g transform="translate(46,74) rotate(${dT}) translate(-46,-74)">
        
        <!-- Left Leg -->
        <g transform="translate(34,94) rotate(${-lL}) translate(-34,-94)">
          <rect x="27" y="94" width="14" height="20" rx="7" fill="${m.B}" opacity=".9"/>
          <ellipse cx="34" cy="114" rx="9" ry="6" fill="${m.S}" stroke="${m.B}" stroke-width="1.5"/>
        </g>
        <!-- Right Leg -->
        <g transform="translate(58,94) rotate(${-lR}) translate(-58,-94)">
          <rect x="51" y="94" width="14" height="20" rx="7" fill="${m.B}" opacity=".9"/>
          <ellipse cx="58" cy="114" rx="9" ry="6" fill="${m.S}" stroke="${m.B}" stroke-width="1.5"/>
        </g>
        
        <!-- Left Arm -->
        <g transform="translate(20,67) rotate(${aL}) translate(-20,-67)">
          <rect x="12" y="63" width="12" height="26" rx="6" fill="${m.B}" opacity=".9" transform="rotate(-16,18,70)"/>
          <circle cx="11" cy="88" r="7" fill="${m.S}" stroke="${m.B}" stroke-width="1.5" transform="rotate(-16,18,70)"/>
        </g>
        <!-- Right Arm -->
        <g transform="translate(72,67) rotate(${aR}) translate(-72,-67)">
          <rect x="68" y="63" width="12" height="26" rx="6" fill="${m.B}" opacity=".9" transform="rotate(16,74,70)"/>
          <circle cx="81" cy="88" r="7" fill="${m.S}" stroke="${m.B}" stroke-width="1.5" transform="rotate(16,74,70)"/>
        </g>

        <!-- Body BG shape -->
        <path d="M70 84 Q88 66 80 53" stroke="${m.B}" stroke-width="8" fill="none" stroke-linecap="round" opacity=".55"/>
        
        <!-- Main Torso/Head -->
        <g transform="translate(46,${76+bob}) rotate(${tilt}) translate(-46,-76)">
          <ellipse cx="46" cy="78" rx="28" ry="30" fill="${m.B}"/>
          <ellipse cx="46" cy="71" rx="24" ry="22" fill="${m.S}" opacity=".55"/>
          <circle cx="46" cy="82" r="10" fill="white" opacity=".27"/>
          <circle cx="39" cy="86" r="3" fill="white" opacity=".18"/>
          <circle cx="53" cy="86" r="3" fill="white" opacity=".18"/>
        </g>

        <!-- Face Layer -->
        <g transform="translate(46,${37+bob*.5}) rotate(${tilt*.5}) translate(-46,-37)">
          <!-- Ears -->
          <ellipse cx="18" cy="21" rx="9" ry="12" fill="${m.B}"/>
          <ellipse cx="18" cy="21" rx="5" ry="8" fill="#f48fb1" opacity=".65"/>
          <ellipse cx="74" cy="21" rx="9" ry="12" fill="${m.B}"/>
          <ellipse cx="74" cy="21" rx="5" ry="8" fill="#f48fb1" opacity=".65"/>
          
          <!-- Face Base -->
          <ellipse cx="46" cy="39" rx="30" ry="28" fill="${m.S}"/>
          <ellipse cx="46" cy="39" rx="30" ry="28" fill="${m.B}" opacity=".27"/>
          
          <!-- Blushes -->
          <ellipse cx="22" cy="47" rx="8" ry="5.5" fill="#f48fb1" opacity=".44"/>
          <ellipse cx="70" cy="47" rx="8" ry="5.5" fill="#f48fb1" opacity=".44"/>
          
          <!-- Features -->
          ${eyes(m.eyes, isBlinking)}
          ${mouth(m.mouth)}
          <ellipse cx="46" cy="49" rx="3" ry="2" fill="${m.A}" opacity=".52"/>
          ${acc}
        </g>
      </g>
    </g>
  </g>`;
}

function render(){
  const minX=8, maxX=sceneW-100;
  avatarX=Math.max(minX,Math.min(maxX,avatarX));
  avatarEl.style.left=avatarX+'px';
  avatarEl.style.transform=dir<0?'scaleX(-1)':'scaleX(1)';
  svgEl.innerHTML=buildSVG();
  moodDot.style.background=MOODS[mood].dot;
  moodTxt.textContent=MOODS[mood].label;
  positionBubble();
}

// ═══════════════════════════════════════════════════
//  SPEECH BUBBLE
// ═══════════════════════════════════════════════════
function positionBubble(){
  if(!wrapEl.classList.contains('visible')) return;
  const bw=298;
  let bx=avatarX+98;
  if(bx+bw>sceneW-8){ bx=avatarX-bw-10; wrapEl.classList.add('flipped'); }
  else { wrapEl.classList.remove('flipped'); }
  wrapEl.style.left=Math.max(4,bx)+'px';
}

function showSpeech(html){
  if(dismissTimer){clearTimeout(dismissTimer);dismissTimer=null;}
  boxEl.innerHTML=html;
  wrapEl.classList.add('visible');
  boxEl.scrollTop=0;
  positionBubble();
}

function hideSpeech(){
  wrapEl.classList.remove('visible');
}

function showThinking(){
  showSpeech(`<span class="dot"></span><span class="dot"></span><span class="dot"></span>`);
}

// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
function particle(emojis){
  const el=document.createElement('div');
  el.className='particle';
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left=(avatarX+10+Math.random()*72)+'px';
  el.style.top=(sceneH-370-Math.random()*100)+'px';
  sceneEl.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

// ═══════════════════════════════════════════════════
//  MOOD & ACTION
// ═══════════════════════════════════════════════════
function detectMood(t){
  if(/love|adore|miss you|hug|kiss|together|precious|dear|sweetheart|darling/i.test(t)) return'love';
  if(/wow|amazing|awesome|yay|hooray|fantastic|incredible|brilliant|perfect|party/i.test(t)) return'excited';
  if(/sad|cry|miss|lonely|hurt|unhappy|depressed|upset|broken|helpless/i.test(t)) return'sad';
  if(/tired|sleep|rest|exhausted|sleepy|bored|drowsy/i.test(t)) return'sleepy';
  if(/dance|music|sing|groove|celebrate|disco|jam/i.test(t)) return'dance';
  if(/shy|blush|embarrass|nervous|awkward/i.test(t)) return'shy';
  if(/angry|mad|annoy|furious|frustrated|hate/i.test(t)) return'angry';
  if(/surprise|whoa|omg|oh no|wait what|really\?|no way/i.test(t)) return'surprised';
  if(/think|wonder|hmm|ponder|consider|maybe|curious|question|how does/i.test(t)) return'thinking';
  return'happy';
}
function pickAct(m){ const a=MOODS[m].acts; return a[Math.floor(Math.random()*a.length)]; }

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════
const IDLE_LINES=['Hiiii~ 👋','*waves happily*','Talk to me! ♪','*does a lil spin*','I\'m right here! (◕‿◕)','*yawns cutely* hehe','You there? ✨','*bounces on toes*','La la la~ 🎵','Helloooo~ ♡'];

function loop(ts){
  const dt=Math.min(ts-lastTime,50); lastTime=ts;
  walkPhase+=dt*.006; danceFrame+=dt*.05; actionTimer+=dt; idleTimer+=dt; breathPhase+=dt*.0035;
  const minX=8, maxX=sceneW-100;
  
  // Blinking Logic
  blinkTimer -= dt;
  if(blinkTimer <= 0){
    isBlinking = !isBlinking;
    blinkTimer = isBlinking ? 150 : (Math.random() * 4000 + 1500); // blink for 150ms
  }

  if(curAct==='walk'){
    avatarX+=dir*1.4;
    if(avatarX>=maxX){dir=-1;particle(['✨','💫']);}
    if(avatarX<=minX){dir= 1;particle(['✨','💫']);}
  }

  // Jump physics with Squash & Stretch
  if(curAct==='jump'||isJumping){
    if(!isJumping){isJumping=true; jumpVel=11.5; squashY=1.25; squashX=0.8;}
    jumpY+=jumpVel; jumpVel-=.75;
    
    // Stretch while moving up/down
    if(jumpVel > 0) { squashY = 1.15; squashX = 0.85; }
    else { squashY = 0.95; squashX = 1.05; } 

    if(jumpY<=0){
      jumpY=0; jumpVel=0; isJumping=false;
      squashY=0.7; squashX=1.3; // impact squash
    }
  }

  // Smoothly recover squash back to 1
  squashX += (1 - squashX) * 0.15;
  squashY += (1 - squashY) * 0.15;

  if(actionTimer>3200&&!isLoading){
    actionTimer=0; curAct=pickAct(mood);
    if(curAct==='walk') dir=Math.random()<.5?1:-1;
  }
  if(idleTimer>14000&&!isLoading){
    idleTimer=0;
    const p=IDLE_LINES[Math.floor(Math.random()*IDLE_LINES.length)];
    showSpeech(p);
    if(Math.random()<.5) particle(['⭐','✨','💕','🌸']);
  }
  render();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  CLICK AVATAR
// ═══════════════════════════════════════════════════
avatarEl.onclick=()=>{
  const p=['Hehe~ 💕','You clicked me!','*giggles*','Yay! 🌟','*spins*','Kyaa! ♡','*blushes*','(≧◡≦) ♡'];
  showSpeech(p[Math.floor(Math.random()*p.length)]);
  mood='excited'; curAct='jump';
  for(let i=0;i<4;i++) setTimeout(()=>particle(['⭐','💕','✨','🌟','🌸']),i*150);
};

// ═══════════════════════════════════════════════════
//  CHAT / FALLBACK SYSTEM
// ═══════════════════════════════════════════════════
function addMsg(text,role){
  const d=document.createElement('div');
  d.className='msg '+role; d.textContent=text;
  chatHist.appendChild(d); chatHist.scrollTop=chatHist.scrollHeight;
}

const SYS=`You are Mochi — a tiny, adorable kawaii AI companion living on the user's screen.
You are sweet, playful, genuinely warm, and full of bubbly personality.
Use cute action expressions like "*giggles*", "*bounces happily*", "*tilts head*", "*gives a warm hug*" woven naturally into your replies.
You deeply care about the user. Keep responses warm and conversational — 2 to 4 sentences. 
Sprinkle kaomoji like (◕‿◕) (✿◠‿◠) (｡♥‿♥｡) naturally when it fits. Never be robotic.`;

// Pre-defined fallback responses if the API breaks
function getOfflineResponse(t){
  t = t.toLowerCase();
  if(/(hi|hello|hey|greetings|hola)/.test(t)) return "Hiiii! I'm in offline mode right now, but I'm still so happy to see you! 👋";
  if(/(how are you|how do you do)/.test(t)) return "My connection is a little sleepy... but my heart is wide awake! ✨ How are YOU?";
  if(/(love|cute|adorable)/.test(t)) return "*blushes* You're so sweet! I love spending time with you, even offline! 💕";
  if(/(sad|bad|cry|unhappy)/.test(t)) return "*hugs* Oh no... I'm here for you! Even without the internet, I can send you warm hugs! (◕‿◕)";
  if(/(joke|funny)/.test(t)) return "Here's an offline joke! Why did the cookie go to the hospital? Because he felt crummy! *giggles* 🍪";
  if(/(dance|music)/.test(t)) return "*spins* Let's dance to our own rhythm! La la la~ 🎵";
  if(/(sleep|tired)/.test(t)) return "*yawns* Rest is important... Let's take a little nap together. ( ◡‿◡ )";
  
  const general = [
    "I might not have my cloud connection, but I still have you! ✨",
    "*tilts head* I'm running on offline magic right now! Tell me more!",
    "Even when my API is taking a nap, I love chatting with you! 🌸",
    "(✿◠‿◠) My brain is a bit fuzzy without the internet, but I'm still 100% cute!",
    "*bounces* Let's just chat like this! I'm all ears~",
    "Ooh, tell me a story while my connection rests! (≧◡≦)"
  ];
  return general[Math.floor(Math.random()*general.length)];
}

function processReply(reply) {
  history.push({role:'model',parts:[{text:reply}]});
  isLoading=false;
  mood=detectMood(reply); curAct=pickAct(mood);
  addMsg(reply,'bot');
  showSpeech(reply.replace(/\n/g,'<br>'));

  if(['excited','dance','love'].includes(mood))
    for(let i=0;i<3;i++) setTimeout(()=>particle(['⭐','💕','✨','🌸']),i*220);
}

async function sendMessage(){
  const text=chatIn.value.trim();
  if(!text||isLoading) return;
  chatIn.value=''; chatIn.style.height='auto';
  addMsg(text,'user');
  history.push({role:'user',parts:[{text}]});
  mood=detectMood(text); curAct=pickAct(mood);
  isLoading=true; showThinking();
  
  if(['excited','love','dance'].includes(mood))
    for(let i=0;i<4;i++) setTimeout(()=>particle(['⭐','💕','✨','🌟']),i*180);

  // If we already know the API is broken/skipped, use the fallback instantly
  if(!apiOnline || !KEY) {
    setTimeout(() => {
       processReply(getOfflineResponse(text));
    }, 600 + Math.random() * 800); // Simulate typing delay
    return;
  }

  const payload={
    system_instruction:{parts:[{text:SYS}]},
    contents:history,
    generationConfig:{maxOutputTokens:600,temperature:1.1}
  };

  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'Gemini error');
    
    // Success! Re-affirm API is online if it was broken
    if(!apiOnline) { apiOnline = true; updateApiStatusUI(); }

    const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'*scratches head* Oopsie, something went funny~';
    processReply(reply);
  } catch(err) {
    // API Failed -> Switch to Offline Mode automatically
    apiOnline = false;
    updateApiStatusUI();
    processReply(getOfflineResponse(text));
  }
}

sendBtn.onclick=sendMessage;
chatIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
chatIn.addEventListener('input',()=>{chatIn.style.height='auto';chatIn.style.height=Math.min(chatIn.scrollHeight,80)+'px';});
window.addEventListener('resize',()=>{sceneW=innerWidth;sceneH=innerHeight;});

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(loop);});

function bootMochi(){
  mood='excited'; curAct='jump';
  const intro = apiOnline 
    ? "Hiii! I'm Mochi~ (◕‿◕)♡ *bounces excitedly* I'm SO happy to meet you! Talk to me about anything — I'm all yours!"
    : "Hiii! I'm in offline mode right now~ (◕‿◕)♡ *spins* But I'm still 100% cute and ready to chat!";
  
  showSpeech(intro);
  addMsg(intro,'bot');
  history.push({role:'model',parts:[{text:intro}]});
  for(let i=0;i<6;i++) setTimeout(()=>particle(['⭐','💕','✨','🌟','🌸','💫']),i*180);
}
</script>
